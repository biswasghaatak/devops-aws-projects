name: Build and Push Docker Image

# Trigger — when does this run?
on:
  push:
    branches:
      - main  # runs when you push to main branch

# Jobs — what to do
jobs:
  build-and-push:
    runs-on: ubuntu-latest  # GitHub provides this server

    steps:
      # Step 1 — Get your code
      - name: Checkout code
        uses: actions/checkout@v4

      # Step 2 — Login to Docker Hub
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      # Step 3 — Build Docker image
      - name: Build Docker image
        run: docker build -t biswasghaatak/health-monitor:latest .

      # Step 4 — Push to Docker Hub
      - name: Push to Docker Hub
        run: docker push biswasghaatak/health-monitor:latest

      # Step 5 — Success message
      - name: Done!
        run: echo "✅ Image built and pushed successfully!"
